name: Deploy web to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/deploy-web.yml

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        id: vercel-config
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping Vercel deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.vercel-config.outputs.configured == 'true'
      - uses: pnpm/action-setup@v4
        if: steps.vercel-config.outputs.configured == 'true'
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        if: steps.vercel-config.outputs.configured == 'true'
        with:
          node-version-file: apps/web/.nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        if: steps.vercel-config.outputs.configured == 'true'
      - run: pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
        working-directory: apps/web
        if: steps.vercel-config.outputs.configured == 'true'
      - run: pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web
        if: steps.vercel-config.outputs.configured == 'true'
      - run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        working-directory: apps/web
        if: steps.vercel-config.outputs.configured == 'true'

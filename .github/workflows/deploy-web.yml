name: Deploy web to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/web/**
      - .github/workflows/deploy-web.yml

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: apps/web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel secrets
        id: vercel-config
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping Vercel deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.vercel-config.outputs.configured == 'true'
      - uses: actions/setup-node@v4
        if: steps.vercel-config.outputs.configured == 'true'
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        if: steps.vercel-config.outputs.configured == 'true'
      - run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        if: steps.vercel-config.outputs.configured == 'true'
      - run: npx vercel build --prod --token="$VERCEL_TOKEN"
        if: steps.vercel-config.outputs.configured == 'true'
      - run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        if: steps.vercel-config.outputs.configured == 'true'
